<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>documentation.lugarerrado.com</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 2rem;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 2rem;
            text-align: center;
        }
        .project-card {
            background: #fff;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 12px rgba(0,0,0,.08);
        }
        .project-card h2 {
            font-size: 1.1rem;
            color: #764ba2;
            margin-bottom: .75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .project-card h2 span {
            font-size: .8rem;
            color: #999;
            font-weight: 400;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 8px 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: .9rem;
        }
        th {
            color: #999;
            font-weight: 600;
            font-size: .75rem;
            text-transform: uppercase;
        }
        td:last-child, th:last-child { text-align: right; color: #bbb; font-size: .8rem; }
        .empty {
            text-align: center;
            color: #bbb;
            padding: 2rem;
            font-style: italic;
        }
        .footer {
            text-align: center;
            color: #999;
            font-size: .8rem;
            margin-top: 2rem;
        }
        .footer a { color: #764ba2; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>documentation.lugarerrado.com</h1>
        <div id="content">
            <div class="empty">Carregando historico de pesquisas...</div>
        </div>
        <div class="footer">
            <a href="https://lugarerrado.com">lugarerrado.com</a>
        </div>
    </div>

    <script>
        function formatTime(ts) {
            var d = new Date(ts);
            return d.toLocaleDateString('pt-BR') + ' ' + d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
        }

        function load() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/search-history', true);
            xhr.onload = function() {
                if (xhr.status !== 200) return;
                var data = JSON.parse(xhr.responseText);
                var container = document.getElementById('content');
                var keys = Object.keys(data);
                if (!keys.length) {
                    container.innerHTML = '<div class="empty">Nenhuma pesquisa registrada</div>';
                    return;
                }
                var html = '';
                keys.forEach(function(projeto) {
                    var items = data[projeto] || [];
                    if (!items.length) return;
                    html += '<div class="project-card">';
                    html += '<h2>' + projeto + ' <span>' + items.length + ' pesquisas</span></h2>';
                    html += '<table><tr><th>Termo</th><th>Data</th></tr>';
                    items.forEach(function(item) {
                        html += '<tr><td>' + item.q + '</td><td>' + formatTime(item.t) + '</td></tr>';
                    });
                    html += '</table></div>';
                });
                container.innerHTML = html;
            };
            xhr.send();
        }
        load();
    </script>
</body>
</html>
